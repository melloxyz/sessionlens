[changelog]
header = ""
body = """
{% if version %}## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## [Unreleased]{% endif %}\n
{% for commit in commits %}
{% set scope = commit.scope %}
{% if scope %}**{{ scope }}:** {% else %}{% endif %}{{ commit.message | trim }} ({{ commit.id | truncate(length=7, end="") }})\
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactors" },
  { message = "^style", group = "Styles" },
  { message = "^test", group = "Tests" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^chore", group = "Chores" },
  { message = "^revert", group = "Reverts" },
  { message = ".*", group = "Other Changes" },
]
protect_breaking_commits = false
filter_commits = false
topo_order = false
sort_commits = "oldest"
